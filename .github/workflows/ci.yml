name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: gradle build + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build + hermetic tests
        run: ./gradlew build test --no-daemon

  integration:
    name: CSS integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Integration tests against Community Solid Server
        run: SOLID_KOTLIN_CSS_TESTS=1 ./gradlew :solid-pod:test --no-daemon
